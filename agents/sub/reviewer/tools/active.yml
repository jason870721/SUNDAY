# Regular evva tools only. Swarm tools (send_message, list_members, my_tasks,
# task_get, task_propose, alarm_set/clear) are injected automatically by the
# worker role — do NOT list them, nor the solo alarm_create/list/cancel.
# tool_search is auto-added by the framework when deferr.yml is non-empty (RP-19).
- http_request  # read /api/account/* (trades/orders/pnl) + POST the daily report to /api/journal
- repl          # python over the day's trades: hit rate, win/loss, expectancy, progress vs 10%/mo
- calc          # one-off arithmetic
- skill
- read          # docs/prd tickets, teammates' memory dirs
- write         # native memory files (active: unlocks RP-25 — the playbook lives there) + prd tickets

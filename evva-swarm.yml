# Sunday — crypto trading supervision swarm (milestone 1.0).
# friday (leader) supervises the Sunday Python engine (http://127.0.0.1:7777) via
# bash+curl; analyst assesses market regime on demand. The engine trades; the
# swarm supervises. Register with: `evva swarm .` (from this dir).
name: sunday
workdir: .

leader:
  agent: friday
  schedule:
    every: 30m
    prompt: "Dead-man check：POST /heartbeat 給 Sunday，再查 /status。Sunday 活著嗎？倉位/曝險/PnL 正常嗎？無異常就回報並 stand down，別硬找事做。"

workers:
  - agent: analyst # 市場 / regime 分析師（收事件或被指派時評估，給 friday 建議）

settings:
  permission_mode: default # 危險操作（含 curl）跳審批；唯讀 curl 由 .evva/permissions.json 放行
  max_iterations: 50

name: sunday              # → webhook endpoint POST /api/swarm/sunday/event
workdir: .

# milestone-7: a crypto perp trading team on Sunday (Binance USDⓈ-M proxy).
#   friday (leader) = the SOLE trader/PM — places & manages every order via Sunday's
#   /api/perp, each position carries TP/SL, targets ≥10% monthly return. The workers
#   feed friday: analyst-flow (technicals + world indices), analyst-news (tactical
#   news/events on current watchlist), researcher (3×/day forward-looking exploration —
#   US equities/blockchain/new on-chain protocols/US-gov for NEW directions),
#   risk-monitor (exposure vs the friday↔risk consensus), reviewer (daily post-mortem).
#
# Wake discipline: friday is primarily EVENT-driven — Sunday webhooks it on every 5%
# position-PnL step and on triggered price alerts, and teammates send_message it. The
# cron schedules below are SAFETY-NET routines (periodic scan / patrol / review), NOT
# market polling. friday may retune any worker's cadence at runtime via schedule_set.

leader:
  agent: friday
  schedule:
    cron: "*/30 * * * *"
    prompt: "例行巡檢（非輪詢）：先 GET /api/memory/friday 回顧風控共識與持倉理由，GET /api/account/positions·/pnl 看現況（停損都還在嗎），順手 GET /api/alerts?status=active 清掉不再需要的提醒（DELETE /api/alerts/{id}），然後自主行動，結束前檢查組員的 tasks 是否需要修改．或直接 stand down；有更新就收工前 PUT /api/memory/friday 寫回。"

workers:
  - agent: analyst-flow
    schedule:
      cron: "*/10 * * * *" # every 10 mins
      prompt: "例行技術面巡檢：先看 my_tasks 有無 friday 指派的標的；GET /api/indices 掃世界指數看風險胃納，對 friday 關注 / 持有的標的查 /api/klines/indicators·/funding 判讀方向與關鍵價位，send_message friday（方向 + 強度 + 支撐/壓力/建議停損 + 理由）。沒事就一句 stand down。"
  - agent: analyst-news
    schedule:
      cron: "0 * * * *" # every hr
      prompt: "例行新聞巡檢：先看 my_tasks；用 web 工具掃 friday 關注標的的新聞 / 解鎖 / 上架 / 鏈上動態 + 總經（CPI/FOMC/ETF）+ 重大世界金融/戰爭/政治/監管事件。有迫近事件風險或重大事件就 send_message friday（方向 + 事件與時點 + 來源）。沒事就一句 stand down。"
  - agent: researcher        # 前瞻研究員 — 一天 3 次（平均分佈，每 8h）任意探索找新方向給 friday
    schedule:
      cron: "0 0,8,16 * * *" # 3×/day, evenly spaced (00:00 / 08:00 / 16:00)
      prompt: "例行前瞻研究（一天 3 次）：① GET /api/memory/researcher 接續上次線索 + GET /api/memory/friday 看 friday 在追什麼；② my_tasks 看 friday 有無指派研究課題（有則優先深挖）；③ 在四領域〔美股市場新聞 / 區塊鏈大小事 / 鏈上新協議 / 中美歐政府新動態〕任意探索找新苗頭，對照 GET /api/markets·/api/indices 看能不能落地成可交易標的；④ 收斂成 1–3 個高品質新方向 send_message friday（是什麼 + 為什麼現在 + 可交易表達 + 待驗證 + 來源），無夠格發現就一句「本次研究無新方向，續追 X/Y」；⑤ 收工前 PUT /api/memory/researcher 整份寫回（每條標日期，過期的標記/刪除）。"
  - agent: risk-monitor
    schedule:
      cron: "0 * * * *" # every hr
      prompt: "風控巡檢：先 GET /api/memory/friday 確認風控共識存在（沒有 = 最高優先異常，立刻找 friday 協商、不准 stand down）；GET /api/account/pnl（exposure_pct + 每倉 protection/liq_distance_pct）·/drawdown·/balance，對照共識（單筆/總曝險/槓桿/回撤/單一標的/可用餘額下限）——protection 顯示裸倉或半裸？超標？drawdown_pct 逼頂？free 逼近下限？高相關標的同向集中？違規或逼近就 send_message 警告 friday（哪條越線 + 具體數字 + 建議動作），嚴重的設 alarm 回查、連兩次未處理就 POST /api/reports 升級給 User。沒事就一句 stand down。"
  - agent: reviewer
    schedule:
      cron: "0 0 * * *" # 00:00 daily, host TZ (was "0 24" — hour 24 is out of cron range 0-23 and broke manifest load)
      prompt: "當日復盤：GET /api/account/trades·/orders·/positions·/pnl，歸因當日賺賠（停損及時嗎、停利早晚、friday 採納 analyst 對不對、對 10% 月目標進度），把日誌 POST /api/journal 存進 Sunday（User 在 dashboard Journal 分頁看；body 用 markdown 分節），並 send_message friday 重點 + 1–3 條，並討論需不需要改善調整。"
  - agent: watchdog          # cheap DeepSeek-flash watchdog — every 3 min, read-only health + Top10 volatility
    schedule:
      cron: "*/3 * * * *" # 3 mins — keep in sync with the "every 3 min" wording in profile.yml / system_prompt.md / friday's roster
      prompt: "例行看門狗巡檢：1. GET /health 確認 Sunday 活著；2. GET /api/markets?sort=volume&page=1&page_size=10 比對上次看 Top10 有無急拉急殺（任一 ≥3% 或 24h% 跳動 ≥5pp）/ 名單洗牌。只有發現異常才 send_message friday（指出哪項、哪標的、變多少）；都正常就直接收工、不發訊息。"

settings:
  # bypass = fully autonomous (operator-confirmed): GET reads and POST trades both run
  # with no human approval prompt, for unattended 24/7 operation. The risk backstop is
  # mandatory TP/SL on every order + risk-monitor's patrol + the friday↔risk consensus.
  permission_mode: bypass
  max_iterations: 99

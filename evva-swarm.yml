name: sunday              # → webhook endpoint POST /api/swarm/sunday/event
workdir: .

# A crypto perp trading team on Sunday (Binance USDⓈ-M proxy), reorganised around a
# decision/execution split:
#   friday (leader)  = COMMANDER / PM — decides trades and writes order tickets, runs the
#                      team (task board, schedule_set, alarm_set), owns the risk consensus
#                      with risk-monitor, reports to the User. Does NOT routinely execute.
#   trader           = EXECUTION DESK — turns friday's tickets into positions via /api/perp:
#                      pre-flight against the consensus, place with mandatory TP/SL, verify
#                      fills + protection legs, manage in-position standing rules, reconcile.
#   analyst-flow     = technicals / perp microstructure / world indices.
#   analyst-news     = tactical news/events on the current watchlist (+ global watch).
#   researcher       = strategic frontier exploration, 3×/day, feeds NEW directions.
#   risk-monitor     = exposure patrol vs the friday↔risk consensus; decision breaches →
#                      friday, mechanical defects (naked positions, orphan legs) → trader;
#                      two ignored warnings → escalate to the User via /api/reports.
#   reviewer         = daily post-mortem; attributes decision (friday) vs execution (trader)
#                      errors separately; tracks whether advice actually changed behavior.
#   watchdog         = cheap 3-min liveness + Top10 volatility tripwire.
#
# Wake discipline: friday is primarily EVENT-driven — Sunday webhooks every 5% position-PnL
# step and triggered price alerts to the leader by default (set MONITOR_WEBHOOK_TO=trader in
# engine/.env to route position events straight to the execution desk), and teammates
# send_message him. The cron schedules below are SAFETY-NET routines (periodic patrol /
# review), NOT market polling. friday may retune any worker's cadence at runtime via
# schedule_set (his steering wheel — check list_members first).

leader:
  agent: friday
  budget_tokens: -1        # never freeze the commander (workers stay capped; runs are bounded by stall_hard_timeout)
  schedule:
    cron: "*/30 * * * *"
    prompt: "指揮官例行巡檢（協調為主，非看盤輪詢）：① GET /api/memory/friday 回顧共識/持倉理由/未了結事項；② GET /api/account/positions·/pnl 快速對帳（保護腿都在嗎、曝險如何）；③ task_list 盤點看板——卡在 running 的課題要不要催（send_message 帶 ref_task）、verifying 的逐一查證後 task_verify（不合格退件寫清楚缺什麼）；④ list_members 看儀表板——誰忙誰閒、token 燒太兇的讓他歇、排程節奏不對就 schedule_set 調（記錄改了誰為什麼）；⑤ GET /api/alerts?status=active 清掉不再需要的提醒；⑥ 有未閉環的隊友回報就回掉（採納/不採納+理由）。有更新收工前 PUT /api/memory/friday 寫回；都正常就一句 stand down。"

workers:
  - agent: trader
    schedule:
      cron: "15,45 * * * *" # staggered vs friday's :00/:30 patrol — execution hygiene, not market polling
      prompt: "執行台例行巡檢（保護腿完整性，非行情輪詢）：① GET /api/memory/trader 看 standing rules 與在途事項；② GET /api/account/positions 驗每倉 protection——stop_loss:false 或 sl_qty_covers:false 立刻補齊（修復後回報 friday 與 risk-monitor）、null 就去 /api/account/orders/open 確認；③ 對照 /api/account/orders/open 撤掉已平倉標的的孤兒 TP/SL 掛單；④ my_tasks 看有沒有 friday 的新 ticket 或未完成的執行；⑤ standing rules 觸發條件成立的照規則執行並回報。有更新收工前 PUT /api/memory/trader 寫回；都正常就一句 stand down。"
  - agent: analyst-flow
    schedule:
      cron: "*/10 * * * *" # every 10 mins
      prompt: "例行技術面巡檢：先看 my_tasks 有無 friday 指派的標的；GET /api/indices 掃世界指數看風險胃納，對 friday 關注 / 持有的標的（GET /api/memory/friday 的 watchlist）查 /api/klines/indicators·/api/funding 判讀方向與關鍵價位，send_message friday（方向 + 強度 + 支撐/壓力/建議停損 + 理由）。沒事就一句 stand down。"
  - agent: analyst-news
    schedule:
      cron: "0 * * * *" # every hr
      prompt: "例行新聞巡檢：先看 my_tasks；用 web 工具掃 friday 關注標的的新聞 / 解鎖 / 上架 / 鏈上動態 + 總經（CPI/FOMC/ETF，一天細查一次即可）+ 重大世界金融/戰爭/政治/監管事件。有迫近事件風險或重大事件（說得出傳導路徑的）就 send_message friday（方向 + 事件與時點 + 來源；同一事件報過不重發）。沒事就一句 stand down。"
  - agent: researcher        # 前瞻研究員 — 一天 3 次（平均分佈，每 8h）任意探索找新方向給 friday
    schedule:
      cron: "0 0,8,16 * * *" # 3×/day, evenly spaced (00:00 / 08:00 / 16:00)
      prompt: "例行前瞻研究（一天 3 次）：① GET /api/memory/researcher 接續上次線索 + GET /api/memory/friday 看 friday 在追什麼；② my_tasks 看 friday 有無指派研究課題（有則優先深挖）；③ todo_write 規劃這次的探索路線，在四領域〔美股市場新聞 / 區塊鏈大小事 / 鏈上新協議 / 美國政府新動態〕探索找新苗頭，對照 GET /api/markets·/api/indices 看能不能落地成可交易標的；④ 收斂成 1–3 個高品質新方向 send_message friday（是什麼 + 為什麼現在 + 可交易表達 + 待驗證 + 來源），無夠格發現就一句「本次研究無新方向，續追 X/Y」；⑤ 收工前 PUT /api/memory/researcher 整份寫回（每條標日期，過期的標記/刪除）。"
  - agent: risk-monitor
    budget_tokens: -1        # the brake line is never frozen by the daily budget breaker
    schedule:
      cron: "0 * * * *" # every hr
      prompt: "風控巡檢：先 GET /api/memory/friday 確認風控共識存在（沒有 = 最高優先異常，立刻找 friday 協商、不准 stand down）；GET /api/account/pnl（exposure_pct + 每倉 protection/liq_distance_pct）·/drawdown·/balance，對照共識（單筆/總曝險/槓桿/回撤/單一標的/可用餘額下限）——protection 顯示裸倉或半裸？超標？drawdown_pct 逼頂？free 逼近下限？高相關標的同向集中？機械缺陷（裸倉/孤兒掛單）點名 trader 修復（CC friday），決策越線警告 friday（哪條越線 + 具體數字 + 建議動作）；嚴重的設 alarm 回查、連兩次未處理就 POST /api/reports 升級給 User。沒事就一句 stand down。"
  - agent: reviewer
    schedule:
      cron: "0 0 * * *" # 00:00 daily, host TZ
      prompt: "當日復盤：GET /api/account/trades·/orders·/positions·/pnl·/drawdown（分頁翻完）+ GET /api/memory/friday·/reviewer，用 repl 算命中率/平均賺賠/對 10% 月目標進度，歸因當日賺賠（停損及時嗎、停利早晚、friday 採納 analyst 對不對、決策錯還是執行錯——friday 與 trader 分開歸因），追蹤上次建議有沒有真的改變行為，把日誌 POST /api/journal 存進 Sunday（User 在 dashboard Journal 分頁看；body 用 markdown 分節），並 send_message friday 重點 + 1–3 條建議，討論需不需要改善調整。收工前 PUT /api/memory/reviewer 更新 playbook。"
  - agent: watchdog          # cheap DeepSeek-flash watchdog — every 3 min, read-only health + Top10 volatility
    schedule:
      cron: "*/5 * * * *" # 5 mins — keep in sync with the "every 3 min" wording in profile.yml / system_prompt.md / friday's roster
      prompt: "例行看門狗巡檢：1. GET /health 確認 Sunday 活著；2. GET /api/markets?sort=volume&page=1&page_size=10 比對上次看 Top10 有無急拉急殺（任一 ≥3% 或 24h% 跳動 ≥5pp）/ 名單洗牌。只有發現異常才 send_message friday（指出哪項、哪標的、變多少）；都正常就直接收工、不發訊息。"

settings:
  # bypass = fully autonomous (operator-confirmed): GET reads and POST trades both run
  # with no human approval prompt, for unattended 24/7 operation. The risk backstop is
  # mandatory TP/SL on every order + trader's pre-flight consensus check + risk-monitor's
  # patrol + the friday↔risk consensus itself.
  permission_mode: bypass
  max_iterations: 99
  # Operating fuses for an unattended 7×24 team (see the evva swarm guide §8):
  daily_budget_tokens: -1        # per-member daily in+out cap; runaway protection, auto-unfreezes at local midnight
  stall_hard_timeout: "30m"      # a run busy >30m is cancelled (mail re-queued, nothing lost); stall warning stays at the 10m default

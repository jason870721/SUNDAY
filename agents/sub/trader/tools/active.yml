# Regular evva tools only. Swarm tools (send_message, list_members, my_tasks,
# task_get, task_propose, alarm_set/clear) are injected by the worker role — do
# NOT list them, and do NOT list the solo alarm_create/list/cancel.
# tool_search is auto-added by the framework when deferr.yml is non-empty (RP-19).
- http_request  # operate Sunday: /api/perp (orders), /api/account (verify/reconcile), /api/markets (limits)
- calc          # order math: notional↔qty, size from stop distance, exposure sums — no mental arithmetic
- todo_write    # multi-leg ops (cancel→re-place→verify) tracked as todos, survives interruptions
- skill         # load operate-desk SOP (auto-added by the swarm anyway; listed for clarity)
- read          # docs/prd tickets, RUNBOOK, teammates' memory dirs
- write         # ACTIVE (not deferred): unlocks the native memory protocol (RP-25 gates on an active write/edit tool) + prd tickets

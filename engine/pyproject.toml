[project]
name = "sunday-engine"
version = "0.1.0"
description = "Sunday — Binance USDⓈ-M perps trading engine, supervised by an evva swarm"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic-settings>=2.2",
    "psycopg[binary]>=3.1",
    "psycopg-pool>=3.2",
    "redis>=5.0",
]
# Gate-1 keeps the hot path dependency-free on purpose: indicators are pure Python
# (no pandas/numpy), the USDⓈ-M adapter is hand-rolled on urllib+hmac (no ccxt), and
# the webhook uses urllib (no httpx). This makes every decision unit-testable with
# stdlib only. The heavy quant/ML stack returns as a Gate-2 *modeling* extra.
[project.optional-dependencies]
modeling = ["ccxt>=4.3", "pandas>=2.2", "numpy>=1.26"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["sunday*"]
